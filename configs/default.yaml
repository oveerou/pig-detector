project:
  name: pig-detector
  class_names:
    - pig

paths:
  # 请替换为你的本地数据路径
  raw_root: path/to/your/pig/data
  raw_train_images: path/to/your/pig/data/train_img
  raw_train_annotations: path/to/your/pig/data/train_json
  raw_test_images: path/to/your/pig/data/test
  yolo_root: data/pig_yolo
  output_dir: outputs

data:
  train_ratio: 0.8
  val_ratio: 0.2
  seed: 42
  image_extensions:
    - .jpg
    - .jpeg
    - .png

train:
  model: yolov8n.pt
  epochs: 50
  imgsz: 640
  batch: 8
  device: 0

risk:
  medium_count: 8
  high_count: 15
  medium_area: 0.25
  high_area: 0.45
  low_confidence: 0.5
